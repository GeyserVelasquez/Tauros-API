server {
    # Render inyecta la variable $PORT automáticamente al iniciar
    listen 8000;

    # Render suele exponer servicios en el puerto 8000 o 10000.
    # Si Render te da un error de puerto, prueba cambiando a 'listen 8000;'

    server_name _;
    index index.php index.html;
    root /var/www/html/public;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Desactivar logs de acceso excesivos si lo prefieres para limpiar el output
    access_log off;
    error_log /var/log/nginx/error.log warn;
}
